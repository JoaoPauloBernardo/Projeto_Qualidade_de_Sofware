[pytest]
# Configurações da suíte PokéAPI — INATEL Qualidade de Software
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Saída verbosa + relatório JSON gerado automaticamente a cada execução
addopts =
    -v
    --tb=short
    --strict-markers
    --json-report
    --json-report-file=reports/report.json
    --json-report-indent=2

# Marcadores personalizados
markers =
    valido: Testes de caminho feliz (dados válidos)
    invalido: Testes de dados inválidos ou inoportunos
    performance: Testes de performance com Locust